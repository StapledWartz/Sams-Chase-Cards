<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam's Chase Cards • Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .tail-container { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .card-img { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-screen-2xl mx-auto">
        <header class="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-50">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-14 h-14 bg-black rounded-3xl p-1 shadow-lg">
                        <img src="logo.png" class="w-full h-full object-contain" alt="Sam's Chase Cards">
                    </div>
                    <div>
                        <h1 class="logo-font text-3xl font-semibold tracking-tighter">SAM'S CHASE CARDS</h1>
                        <p class="text-xs text-pink-400 -mt-1">TRADING CARD TRACKER</p>
                    </div>
                </div>
                <div id="stats" class="text-sm text-pink-400 font-medium"></div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="px-6 pt-4 border-b border-zinc-800">
            <div class="flex border-b border-zinc-700">
                <button onclick="switchTab(0)" id="tab-all" 
                        class="tab-button px-8 py-4 font-medium border-b-2 border-pink-500 text-pink-400">All Cards</button>
                <button onclick="switchTab(1)" id="tab-owned" 
                        class="tab-button px-8 py-4 font-medium text-zinc-400">Owned Cards</button>
            </div>
        </div>

        <div class="p-6">
            <input id="search-input" onkeyup="filterCards()" placeholder="Search..." 
                   class="w-full bg-zinc-900 border border-zinc-700 focus:border-pink-500 rounded-3xl px-6 py-5 outline-none mb-8">

            <div id="grid-view" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-6"></div>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0vHCargExvsNDK7UUL6DccDHoJ8SMfDTh5QEDK47y3XBu3uNsReX93vmQfLApocJtwPZ7EQQZywbf/pub?output=csv";
        let allCards = [];
        let ownedCards = JSON.parse(localStorage.getItem('ownedCards')) || {};
        let currentTab = 0; // 0 = all, 1 = owned

        async function loadCards() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.trim().split('\n').map(l => l.split(',').map(c => c.replace(/^"|"$/g,'').trim()));

            allCards = rows.slice(1).map((r, i) => ({
                id: i,
                image: r[0] || '',
                name: r[1] || '',
                number: r[2] || '',
                setName: r[5] || '',
                setAbbr: r[4] || '',
                year: r[6] || ''
            })).filter(c => c.name);

            updateStats();
            renderCards();
        }

        function updateStats() {
            const count = Object.keys(ownedCards).length;
            document.getElementById('stats').innerHTML = `Owned: <span class="text-pink-400">${count}</span> / ${allCards.length}`;
        }

        function toggleOwned(id) {
            if (ownedCards[id]) delete ownedCards[id];
            else ownedCards[id] = true;
            localStorage.setItem('ownedCards', JSON.stringify(ownedCards));
            updateStats();
            renderCards();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-all').classList.toggle('border-pink-500', tab === 0);
            document.getElementById('tab-all').classList.toggle('text-pink-400', tab === 0);
            document.getElementById('tab-owned').classList.toggle('border-pink-500', tab === 1);
            document.getElementById('tab-owned').classList.toggle('text-pink-400', tab === 1);
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('grid-view');
            container.innerHTML = '';

            let toRender = allCards;

            if (currentTab === 1) {
                toRender = allCards.filter(c => ownedCards[c.id]);
            }

            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            if (searchTerm) {
                toRender = toRender.filter(c => 
                    c.name.toLowerCase().includes(searchTerm) || 
                    c.number.toLowerCase().includes(searchTerm)
                );
            }

            toRender.forEach(card => {
                const isOwned = !!ownedCards[card.id];
                const div = document.createElement('div');
                div.className = `group bg-zinc-900 border ${isOwned ? 'border-pink-600' : 'border-zinc-700'} rounded-3xl overflow-hidden hover:border-pink-500 transition-all`;
                div.innerHTML = `
                    <div class="aspect-[4/3] bg-zinc-950 p-4 flex items-center justify-center relative">
                        <img src="${card.image}" onerror="this.src='https://picsum.photos/id/237/400/300'" 
                             class="card-img w-full h-full object-contain" alt="${card.name}">
                        <button onclick="event.stopImmediatePropagation(); toggleOwned(${card.id});" 
                                class="absolute top-4 right-4 px-5 py-2 ${isOwned ? 'bg-pink-600' : 'bg-black/80 hover:bg-pink-600'} rounded-2xl text-sm font-medium transition-colors">
                            ${isOwned ? '✓ Owned' : 'Got it'}
                        </button>
                    </div>
                    <div class="p-5">
                        <div class="font-semibold line-clamp-2">${card.name}</div>
                        <div class="text-xs text-zinc-400 mt-2">${card.number} • ${card.setAbbr}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function filterCards() {
            renderCards();
        }

        window.onload = loadCards;
    </script>
</body>
</html>
