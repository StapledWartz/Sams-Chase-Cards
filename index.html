<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam's Chase Cards • Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .tail-container { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .card-img { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-screen-2xl mx-auto">
        <header class="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-50">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-14 h-14 bg-black rounded-3xl p-1 shadow-lg">
                        <img src="logo.png" class="w-full h-full object-contain" alt="Sam's Chase Cards">
                    </div>
                    <div>
                        <h1 class="logo-font text-3xl font-semibold tracking-tighter">SAM'S CHASE CARDS</h1>
                        <p class="text-xs text-pink-400 -mt-1">TRADING CARD TRACKER</p>
                    </div>
                </div>
                <div id="stats" class="text-sm text-pink-400 font-medium"></div>
            </div>
        </header>

        <div class="px-6 pt-4 border-b border-zinc-800">
            <div class="flex">
                <button onclick="switchTab(0)" id="tab-all" class="tab-button px-8 py-4 font-medium border-b-2 border-pink-500 text-pink-400">All Cards</button>
                <button onclick="switchTab(1)" id="tab-owned" class="tab-button px-8 py-4 font-medium text-zinc-400">Owned Cards</button>
            </div>
        </div>

        <div class="p-6">
            <div class="flex flex-wrap gap-4 mb-8">
                <input id="search-input" onkeyup="filterCards()" placeholder="Search..." class="flex-1 bg-zinc-900 border border-zinc-700 focus:border-pink-500 rounded-3xl px-6 py-5 outline-none">
                <select id="sort-select" onchange="filterCards()" class="bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5 outline-none">
                    <option value="name-asc">A-Z</option>
                    <option value="name-desc">Z-A</option>
                    <option value="number">By Number</option>
                </select>
            </div>

            <div id="grid-view" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-6"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6">
        <div class="bg-zinc-900 rounded-3xl max-w-lg w-full overflow-hidden">
            <div class="p-4 flex justify-end">
                <button onclick="closeModal()" class="text-3xl leading-none hover:text-pink-400">×</button>
            </div>
            <div id="modal-image" class="px-8 pb-8"></div>
            <div class="p-6 border-t border-zinc-800">
                <div id="modal-name" class="text-2xl font-semibold mb-2"></div>
                <div id="modal-info" class="text-zinc-400 mb-6"></div>
                <button id="modal-toggle-btn" onclick="toggleFromModal()" class="w-full py-4 rounded-2xl text-lg font-medium"></button>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0vHCargExvsNDK7UUL6DccDHoJ8SMfDTh5QEDK47y3XBu3uNsReX93vmQfLApocJtwPZ7EQQZywbf/pub?output=csv";
        let allCards = [];
        let ownedCards = JSON.parse(localStorage.getItem('ownedCards')) || {};
        let currentCardId = null;
        let currentTab = 0;

        async function loadCards() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.trim().split('\n').map(l => l.split(',').map(c => c.replace(/^"|"$/g,'').trim()));

            allCards = rows.slice(1).map((r, i) => ({
                id: i,
                image: r[0] || '',
                name: r[1] || '',
                number: r[2] || '',
                setIcon: r[3] || '',
                setName: r[5] || '',
                setAbbr: r[4] || '',
                year: r[6] || ''
            })).filter(c => c.name);

            updateStats();
            renderCards();
        }

        function updateStats() {
            const count = Object.keys(ownedCards).length;
            document.getElementById('stats').innerHTML = `Owned: <span class="text-pink-400">${count}</span> / ${allCards.length}`;
        }

        function toggleOwned(id) {
            if (ownedCards[id]) delete ownedCards[id];
            else ownedCards[id] = true;
            localStorage.setItem('ownedCards', JSON.stringify(ownedCards));
            updateStats();
            renderCards();
        }

        function showModal(card) {
            currentCardId = card.id;
            const isOwned = !!ownedCards[card.id];

            document.getElementById('modal-image').innerHTML = `<img src="${card.image}" class="w-full rounded-2xl" alt="${card.name}">`;
            document.getElementById('modal-name').innerHTML = `${card.name} ${card.setIcon ? `<img src="${card.setIcon}" class="inline w-8 h-8 ml-3 align-middle" alt="set">` : ''}`;
            document.getElementById('modal-info').innerHTML = `#${card.number} • ${card.setName} (${card.year})`;

            const btn = document.getElementById('modal-toggle-btn');
            btn.textContent = isOwned ? "Mark as Wanted" : "Got It!";
            btn.className = `w-full py-4 rounded-2xl text-lg font-medium ${isOwned ? 'bg-red-600 hover:bg-red-700' : 'bg-pink-600 hover:bg-pink-500'}`;

            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function toggleFromModal() {
            if (currentCardId !== null) toggleOwned(currentCardId);
            const card = allCards.find(c => c.id === currentCardId);
            if (card) showModal(card);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-all').classList.toggle('border-pink-500', tab === 0);
            document.getElementById('tab-all').classList.toggle('text-pink-400', tab === 0);
            document.getElementById('tab-owned').classList.toggle('border-pink-500', tab === 1);
            document.getElementById('tab-owned').classList.toggle('text-pink-400', tab === 1);
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('grid-view');
            container.innerHTML = '';

            let toRender = currentTab === 1 ? allCards.filter(c => ownedCards[c.id]) : allCards;

            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            if (searchTerm) {
                toRender = toRender.filter(c => c.name.toLowerCase().includes(searchTerm) || c.number.toLowerCase().includes(searchTerm));
            }

            const sortMode = document.getElementById('sort-select').value;
            toRender.sort((a, b) => {
                if (sortMode === 'name-asc') return a.name.localeCompare(b.name);
                if (sortMode === 'name-desc') return b.name.localeCompare(a.name);
                if (sortMode === 'number') return a.number.localeCompare(b.number, undefined, {numeric: true});
                return 0;
            });

            toRender.forEach(card => {
                const isOwned = !!ownedCards[card.id];
                const div = document.createElement('div');
                div.className = `group bg-zinc-900 border ${isOwned ? 'border-pink-600' : 'border-zinc-700'} rounded-3xl overflow-hidden hover:border-pink-500 transition-all cursor-pointer`;
                div.innerHTML = `
                    <div class="aspect-[4/3] bg-zinc-950 p-4 flex items-center justify-center relative">
                        <img src="${card.image}" onerror="this.src='https://picsum.photos/id/237/400/300'" class="card-img w-full h-full object-contain" alt="${card.name}">
                    </div>
                    <div class="p-5">
                        <div class="flex items-center justify-between">
                            <div class="font-semibold line-clamp-2 flex-1">${card.name}</div>
                            ${card.setIcon ? `<img src="${card.setIcon}" class="w-8 h-8 object-contain ml-3 flex-shrink-0" alt="set icon">` : ''}
                        </div>
                        <div class="flex justify-between items-center mt-4">
                            <div class="text-xs text-zinc-400">${card.number} • ${card.setAbbr}</div>
                            <button onclick="event.stopImmediatePropagation(); toggleOwned(${card.id});" 
                                    class="text-sm font-medium px-4 py-2 ${isOwned ? 'bg-pink-600' : 'bg-zinc-800 hover:bg-zinc-700'} rounded-2xl">
                                ${isOwned ? '✓ Owned' : 'Got it'}
                            </button>
                        </div>
                    </div>
                `;
                div.onclick = () => showModal(card);
                container.appendChild(div);
            });
        }

        function filterCards() {
            renderCards();
        }

        window.onload = loadCards;
    </script>
</body>
</html>
