<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam's Chase Cards • Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .tail-container { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .card-img { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover .card-img { transform: scale(1.08) rotate(2deg); }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-screen-2xl mx-auto">
        <header class="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-50">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-14 h-14 bg-black rounded-3xl p-1 shadow-lg">
                        <img src="logo.png" class="w-full h-full object-contain" alt="Sam's Chase Cards">
                    </div>
                    <div>
                        <h1 class="logo-font text-3xl font-semibold tracking-tighter">SAM'S CHASE CARDS</h1>
                        <p class="text-xs text-pink-400 -mt-1">TRADING CARD TRACKER</p>
                    </div>
                </div>
                <div class="flex items-center gap-x-8">
                    <div id="stats" class="text-sm text-zinc-400"></div>
                    <div id="total-count" class="bg-zinc-900 px-6 py-3 rounded-3xl text-sm border border-zinc-700 font-medium"></div>
                </div>
            </div>
        </header>

        <div class="p-6">
            <div class="flex flex-wrap gap-4 mb-8">
                <input id="search-input" onkeyup="filterCards()" placeholder="Search..." 
                       class="flex-1 bg-zinc-900 border border-zinc-700 focus:border-pink-500 rounded-3xl px-6 py-5 outline-none">
                <select id="set-filter" onchange="filterCards()" class="bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5 outline-none"></select>
                <select id="owned-filter" onchange="filterCards()" class="bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5 outline-none">
                    <option value="">All Cards</option>
                    <option value="owned">Owned</option>
                    <option value="wanted">Wanted</option>
                </select>
            </div>

            <div id="grid-view" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-6"></div>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0vHCargExvsNDK7UUL6DccDHoJ8SMfDTh5QEDK47y3XBu3uNsReX93vmQfLApocJtwPZ7EQQZywbf/pub?output=csv";
        let allCards = [];
        let ownedCards = JSON.parse(localStorage.getItem('ownedCards')) || {};

        async function loadCards() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.trim().split('\n').map(l => l.split(',').map(c => c.replace(/^"|"$/g,'').trim()));

            allCards = rows.slice(1).map((r, i) => ({
                id: i,
                image: r[0] || '',
                name: r[1] || '',
                number: r[2] || '',
                setName: r[5] || '',
                setAbbr: r[4] || '',
                year: r[6] || ''
            })).filter(c => c.name);

            document.getElementById('total-count').innerHTML = `<span class="font-mono text-pink-400">${allCards.length}</span> cards`;
            populateFilters();
            renderCards(allCards);
            updateStats();
        }

        function populateFilters() {
            const sets = [...new Set(allCards.map(c => c.setName).filter(Boolean))].sort();
            const setSelect = document.getElementById('set-filter');
            sets.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s; opt.textContent = s;
                setSelect.appendChild(opt);
            });
        }

        function toggleOwned(id) {
            if (ownedCards[id]) {
                delete ownedCards[id];
            } else {
                ownedCards[id] = true;
            }
            localStorage.setItem('ownedCards', JSON.stringify(ownedCards));
            updateStats();
            filterCards();
        }

        function updateStats() {
            const count = Object.keys(ownedCards).length;
            document.getElementById('stats').innerHTML = `Owned: <span class="text-pink-400 font-medium">${count}</span> / ${allCards.length}`;
        }

        function renderCards(cards) {
            const container = document.getElementById('grid-view');
            container.innerHTML = '';

            cards.forEach(card => {
                const isOwned = !!ownedCards[card.id];
                const div = document.createElement('div');
                div.className = `group bg-zinc-900 border ${isOwned ? 'border-pink-600' : 'border-zinc-700'} rounded-3xl overflow-hidden hover:border-pink-500 transition-all`;
                div.innerHTML = `
                    <div class="aspect-[4/3] bg-zinc-950 p-4 flex items-center justify-center relative">
                        <img src="${card.image}" onerror="this.src='https://picsum.photos/id/237/400/300'" 
                             class="card-img w-full h-full object-contain" alt="${card.name}">
                        <button onclick="event.stopImmediatePropagation(); toggleOwned(${card.id});" 
                                class="absolute top-4 right-4 px-4 py-2 bg-black/80 hover:bg-pink-600 rounded-2xl text-sm font-medium transition-colors flex items-center gap-2">
                            <i class="fa-solid ${isOwned ? 'fa-check' : 'fa-plus'}"></i>
                            ${isOwned ? 'Owned' : 'Got it'}
                        </button>
                    </div>
                    <div class="p-5">
                        <div class="font-semibold line-clamp-2">${card.name}</div>
                        <div class="text-xs text-zinc-400 mt-2">${card.number} • ${card.setAbbr}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function filterCards() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const setF = document.getElementById('set-filter').value;
            const ownedF = document.getElementById('owned-filter').value;

            const filtered = allCards.filter(c => {
                const searchMatch = c.name.toLowerCase().includes(term) || c.number.toLowerCase().includes(term);
                const setMatch = !setF || c.setName === setF;
                const ownedMatch = ownedF === '' || (ownedF === 'owned' && ownedCards[c.id]) || (ownedF === 'wanted' && !ownedCards[c.id]);
                return searchMatch && setMatch && ownedMatch;
            });
            renderCards(filtered);
        }

        window.onload = loadCards;
    </script>
</body>
</html>
